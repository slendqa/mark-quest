<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mark's Quest Center PRO 🏆</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap');
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: #f8fafc; 
            touch-action: manipulation; 
            -webkit-tap-highlight-color: transparent;
            font-size: 0.85rem; 
        }
        .quest-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); border-width: 2px; }
        .quest-card:active { transform: scale(0.98); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .calendar-day { 
            min-height: 5rem; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            border-radius: 12px; position: relative; border: 2px solid transparent; 
        }
        .calendar-day.selected { border-color: #3b82f6; background-color: #eff6ff; }
        .progress-bar { transition: width 0.8s ease-out; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .admin-tab-btn.active { background-color: #1e293b; color: white; border-left: 4px solid #3b82f6; }
        .reverted { opacity: 0.6; filter: grayscale(1); }
        
        /* Адаптивний Sidebar */
        #sidebar { transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); width: 80px; overflow: hidden; }
        #sidebar.expanded { width: 220px; }
        .sidebar-header { display: flex; align-items: center; justify-content: center; padding: 1rem; transition: all 0.3s; }
        #sidebar.expanded .sidebar-header { justify-content: flex-end; }
        
        .nav-item { display: flex; align-items: center; justify-content: center; padding: 0.75rem; border-radius: 1rem; transition: all 0.3s; margin: 0 0.5rem; border: 2px solid transparent;}
        #sidebar.expanded .nav-item { justify-content: flex-start; padding-left: 1.25rem; }
        
        .icon-element { font-size: 1.5rem; transition: transform 0.3s; }
        #sidebar.expanded .icon-element { transform: scale(0.9); }
        
        .nav-label { opacity: 0; display: none; margin-left: 1rem; font-size: 0.75rem; font-weight: 900; text-transform: uppercase; white-space: nowrap; }
        #sidebar.expanded .nav-label { opacity: 1; display: inline-block; }
        
        #main-wrapper { transition: margin-left 0.3s; margin-left: 80px; }
        #sidebar.expanded + #main-wrapper { margin-left: 220px; }

        [v-cloak] { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <div id="app" class="flex min-h-screen">
        <!-- Sidebar Навігація -->
        <aside id="sidebar" class="fixed h-full bg-white border-r-2 border-slate-100 flex flex-col z-[200] shadow-sm">
            <div class="sidebar-header w-full">
                <button onclick="window.toggleSidebar(event)" class="p-2 bg-slate-50 rounded-xl hover:bg-slate-100 transition-colors text-slate-600 w-10 h-10 flex items-center justify-center outline-none">
                    <span id="menu-icon" class="text-xl font-black">☰</span>
                </button>
            </div>
            
            <nav class="flex flex-col gap-3 mt-4">
                <button onclick="window.switchTab('tasks')" id="tab-tasks" class="nav-item bg-blue-600 text-white shadow-md">
                    <span class="icon-element">🎯</span>
                    <span class="nav-label">Квести</span>
                </button>
                <button onclick="window.switchTab('shop')" id="tab-shop" class="nav-item bg-white text-slate-400 hover:bg-slate-50">
                    <span class="icon-element">🎁</span>
                    <span class="nav-label">Крамниця</span>
                </button>
                <button onclick="window.switchTab('goals')" id="tab-goals" class="nav-item bg-white text-slate-400 hover:bg-slate-50">
                    <span class="icon-element">💎</span>
                    <span class="nav-label">Мрії</span>
                </button>
                <button onclick="window.switchTab('calendar')" id="tab-calendar" class="nav-item bg-white text-slate-400 hover:bg-slate-50">
                    <span class="icon-element">📅</span>
                    <span class="nav-label">Історія</span>
                </button>
            </nav>

            <div class="mt-auto pb-6 pt-2">

                    <span class="nav-label" id="nav-label-admin">Адмін</span>
                </button>
            </div>
        </aside>

                            <div class="flex items-center gap-2 mt-2 justify-center sm:justify-start">
                                <span id="user-rank" class="bg-blue-600 text-white text-[9px] font-black px-2 py-0.5 rounded-full uppercase italic tracking-tighter shadow-sm">...</span>
                                <span class="text-slate-400 font-bold text-[9px] uppercase"><span id="ui-level-text">Рівень</span> <span id="user-level" class="text-blue-600">1</span></span>
                            </div>
                        </div>
                        <div class="flex items-center gap-4">
                            <button onclick="window.toggleLang()" class="bg-slate-100 px-3 py-1.5 rounded-lg text-[9px] font-black text-slate-500 border-2 border-slate-200 uppercase hover:bg-slate-200 transition-colors">UA / EN</button>
                            <div id="balance-container" class="bg-yellow-400 px-6 py-3 rounded-[1.2rem] flex items-center gap-2 shadow-md border-b-4 border-yellow-600">
                                <span class="text-xl">⭐</span>
                                <span id="balance" class="text-3xl font-black text-yellow-900 leading-none">0</span>
                            </div>
                        </div>
                    </div>
                    <!-- Прогрес бар -->
                    <div class="absolute bottom-0 left-0 w-full h-2 bg-slate-50">
                        <div id="level-progress" class="h-full bg-blue-500 progress-bar shadow-[0_0_10px_rgba(59,130,246,0.3)]" style="width: 0%"></div>
                    </div>
                </header>

                <!-- Контент секцій -->
                <div id="section-tasks" class="space-y-4">
                    <div id="tasks-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>

                <div id="section-shop" class="hidden space-y-4">

                </div>

                <div id="section-goals" class="hidden space-y-4 text-slate-800">

                </div>
                
                <!-- Історія та Календар у дві колонки -->
                <div id="section-calendar" class="hidden text-slate-800">
                    <div class="flex flex-col lg:flex-row gap-6 items-start">
                        <!-- Default: Today's Details (Ліва колонка) -->
                        <div id="day-details" class="flex-1 w-full bg-white p-6 rounded-[2rem] border-2 border-slate-50 shadow-xl">
                            <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6 pb-4 border-b-2 border-slate-50">
                                <div class="text-center sm:text-left">
                                    <h4 id="details-date" class="font-black text-xl uppercase text-slate-800">Сьогодні</h4>

                                    <div class="flex gap-1">

                    </div>
                </div>
            </div>
        </div>
    </div>

                    <div id="admin-list-shop" class="space-y-2 text-slate-800"></div>

                                </div>
                            </div>
                            <div id="audit-calendar-body" class="calendar-grid text-slate-800"></div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

        function renderAuditCalendar() {
            const b = document.getElementById('audit-calendar-body'); const h = document.getElementById('audit-calendar-header-title'); if(!b || !h) return;
            const y = auditDate.getFullYear(), m = auditDate.getMonth(); h.innerText = auditDate.toLocaleDateString(state.lang==='uk'?'uk-UA':'en-US', {month:'long', year:'numeric'});
            const fd = new Date(y, m, 1).getDay(); const dim = new Date(y, m+1, 0).getDate(); const off = fd === 0 ? 6 : fd - 1;
            let html = ""; for (let i = 0; i < off; i++) html += `<div></div>`;
            for (let d = 1; d <= dim; d++) {
                const ds = toYMD(new Date(y, m, d));
                const dayLogs = historyLogs.filter(l => toYMD(l.timestamp) === ds && !l.reverted);
                const count = dayLogs.filter(l => l.type === 'task').length;
                const stars = dayLogs.reduce((s, l) => l.type==='task' ? s+l.value : s-l.value, 0);
                html += `<div onclick="window.setAuditDay('${ds}')" class='calendar-day cursor-pointer p-1 transition-all text-[10px] ${auditDateStr===ds?'bg-blue-600 text-white shadow-md':'bg-slate-50 text-slate-800 hover:bg-slate-100'}'>
                            <span class='font-black text-sm'>${d}</span>
                            ${count > 0 ? `<div class='flex flex-col text-[7px] items-center mt-1 leading-tight'><span>🎯${count}</span><span class='font-black ${auditDateStr===ds?'text-white':'text-blue-500'}'>⭐${stars}</span></div>` : ''}
                         </div>`;
            } b.innerHTML = html;
        }

        function renderCalendar() {
            const b = document.getElementById('calendar-body'); const mh = document.getElementById('calendar-month-year'); if(!b || !mh) return;
            const t = translations[state.lang];
            const y = viewDate.getFullYear(), m = viewDate.getMonth(); mh.innerText = viewDate.toLocaleDateString(state.lang==='uk'?'uk-UA':'en-US', {month:'long', year:'numeric'});
            const fd = new Date(y, m, 1).getDay(); const dim = new Date(y, m+1, 0).getDate(); const off = fd === 0 ? 6 : fd - 1;
            
            const totalTasksAvailable = config.tasks ? config.tasks.length : 0;
            let monthTotal = 0;
            let h = ""; 
            
            for (let i = 0; i < off; i++) h += `<div></div>`;
            for (let d = 1; d <= dim; d++) {
                const ds = toYMD(new Date(y, m, d));
                const dayLogs = historyLogs.filter(l => toYMD(l.timestamp) === ds && !l.reverted);
                const count = dayLogs.filter(l => l.type === 'task').length;
                const earned = dayLogs.reduce((s,l)=> l.type==='task' ? s+l.value : s, 0);
                monthTotal += earned;
                
                // End of day balance logic remains exactly the same
                const bal = historyLogs.filter(l => l.timestamp <= new Date(ds + 'T23:59:59').getTime()).reduce((acc,l)=> l.reverted ? acc : (l.type==='task' ? acc+l.value : acc-l.value), 0);
                
                h += `<div onclick="window.showDayDetails('${ds}')" class='calendar-day cursor-pointer p-2 transition-all ${selectedDateStr===ds?'selected border-blue-400 shadow-md':'bg-slate-50 hover:bg-slate-100'} text-slate-800'>
                        <span class='text-sm font-black'>${d}</span>
                        <div class='flex flex-col items-center mt-1 leading-tight'>
                            ${count > 0 ? `<span class='text-[8px] font-bold text-slate-500'>🎯 ${count}/${totalTasksAvailable}</span>` : ''}
                            ${historyLogs.some(l=>toYMD(l.timestamp)===ds) ? `<span class='text-[9px] font-black text-blue-600'>🪙 ${bal}</span>` : ''}
                        </div>
                    </div>`;
            } 
            b.innerHTML = h;
            
            const monthTotalEl = document.getElementById('ui-month-total');
            if(monthTotalEl) {
                monthTotalEl.innerText = `${t.month_total} ${monthTotal} ⭐`;
                monthTotalEl.classList.remove('hidden');
            }
        }

        function updateLevelUI() {
            if (!config.ranks || config.ranks.length === 0) return;
            const total = state.totalEarned || 0;
            let ci = 0; for (let i = config.ranks.length - 1; i >= 0; i--) if (total >= config.ranks[i].threshold) { ci = i; break; }
            const rankEl = document.getElementById('user-rank'); if(rankEl) rankEl.innerText = config.ranks[ci].title[state.lang] || config.ranks[ci].title.uk;
            const levelEl = document.getElementById('user-level'); if(levelEl) levelEl.innerText = ci + 1;
            const next = config.ranks[ci + 1];
            const p = next ? Math.min(100, Math.max(0, ((total - config.ranks[ci].threshold) / (next.threshold - config.ranks[ci].threshold)) * 100)) : 100;
            const progEl = document.getElementById('level-progress'); if(progEl) progEl.style.width = p + "%";
        }

        window.completeTask = async function(id, pts) {
            if (!user) return;
            const task = config.tasks.find(t => t.id === id);
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'userState', 'main'), { 
                balance: state.balance + pts, totalEarned: (state.totalEarned || 0) + pts, completedTasks: [...state.completedTasks, id] 
            });
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'history'), { 
                timestamp: Date.now(), type: 'task', title: task.title[state.lang] || task.title.uk, value: pts, icon: task.icon || '🎯', reverted: false, taskId: id 
            });
            showToast(`+${pts} ⭐`);
        };

        window.revertAction = async function(logId, type, value, taskId) {
            if (!user) return;
            const t = translations[state.lang];
            const newBalance = type === 'task' ? state.balance - value : state.balance + value;
            const newTotal = type === 'task' ? (state.totalEarned || 0) - value : state.totalEarned;
            const newCompleted = taskId ? state.completedTasks.filter(id => id !== taskId) : state.completedTasks;
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'userState', 'main'), { 
                balance: Math.max(0, newBalance), totalEarned: Math.max(0, newTotal), completedTasks: newCompleted
            });
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'history', logId), { reverted: true, revertedAt: Date.now() });
            showToast(t.toast_cancelled);
        }

        window.buyReward = async function(id, cost) {
            if (!user || state.balance < cost) return;
            const t = translations[state.lang];
            const reward = config.shop.find(r => r.id === id);
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'userState', 'main'), { balance: state.balance - cost });
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'history'), { timestamp: Date.now(), type: 'reward', title: reward.title[state.lang] || reward.title.uk, value: cost, icon: reward.icon || '🎁', reverted: false });
            showToast(t.toast_bought);
        };

        window.setAuditDay = (ds) => { auditDateStr = ds; renderAuditCalendar(); renderAuditHistory(); };
        window.goToToday = () => { viewDate = new Date(); selectedDateStr = toYMD(new Date()); window.showDayDetails(selectedDateStr); };
        window.goToAuditToday = () => { auditDate = new Date(); auditDateStr = toYMD(new Date()); window.setAuditDay(auditDateStr); };
        
        window.updatePin = async () => { const t = translations[state.lang]; const v = document.getElementById('new-pin-input').value; if(v.length === 4) { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'userState', 'main'), { pin: v }); showToast(t.toast_pin_updated); document.getElementById('new-pin-input').value = ""; } };
        window.addBonus = async (p) => { if (!user) return; const t = translations[state.lang]; const nt = (state.totalEarned||0)+p; await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'userState', 'main'), { balance: state.balance + p, totalEarned: nt }); await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'history'), { timestamp: Date.now(), type: 'task', title: t.toast_bonus, value: p, icon: '🎁', reverted: false }); showToast(t.toast_bonus); };
        window.confirmAction = async (a) => { if (a === 'resetTasks') { const t = translations[state.lang]; await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'userState', 'main'), { completedTasks: [] }); showToast(t.toast_reset); } };
        
        window.switchAdminTab = function(tabName) {
            document.querySelectorAll('.admin-tab-btn').forEach(b => b.classList.remove('active'));
            const btn = document.getElementById(`admin-tab-${tabName}`); if(btn) btn.classList.add('active');
            ['general', 'tasks', 'shop', 'goals', 'audit', 'ranks'].forEach(x => { const el = document.getElementById(`admin-content-${x}`); if(el) el.classList.add('hidden'); });
            const content = document.getElementById(`admin-content-${tabName}`); if(content) content.classList.remove('hidden');
            if(tabName==='audit') { renderAuditCalendar(); renderAuditHistory(); }
            renderAdminLists();
        };

        window.editItem = function(type, id) {
            const item = config[type].find(i => (i.id || i.threshold) === id);
            if (!item) return;
            editingState[type] = id;
            
            const t = translations[state.lang];
            if (type === 'ranks') {
                document.getElementById('rank-title-ua').value = item.title.uk;
                document.getElementById('rank-threshold').value = item.threshold;
                document.getElementById('ui-admin-add-rank').innerText = t.save;
            } else {
                const pfx = type === 'shop' ? 'shop' : type.slice(0, -1);
                document.getElementById(`${pfx}-title-ua`).value = item.title.uk;
                document.getElementById(`${pfx}-${type === 'tasks' ? 'points' : 'cost'}`).value = item.points || item.cost;
                document.getElementById(`${pfx}-icon`).value = item.icon || '✨';
                const btnId = type === 'tasks' ? 'ui-admin-add-task' : (type === 'shop' ? 'ui-admin-add-item' : 'ui-admin-add-goal');
                document.getElementById(btnId).innerText = t.save;
            }
        };

        window.addItem = async (type) => { 
            const t = translations[state.lang];
            
            if (type === 'ranks') {
                const titleInput = document.getElementById('rank-title-ua').value;
                const val = parseInt(document.getElementById('rank-threshold').value);
                if (!titleInput || isNaN(val)) return showToast(t.toast_fill_fields);
                
                if (editingState.ranks !== null) {
                    const idx = config.ranks.findIndex(r => (r.id || r.threshold) === editingState.ranks);
                    if (idx > -1) { config.ranks[idx].title = { uk: titleInput, en: titleInput }; config.ranks[idx].threshold = val; }
                    editingState.ranks = null;
                    document.getElementById('ui-admin-add-rank').innerText = t.add;
                    showToast(t.toast_updated);
                } else {
                    if (!config.ranks) config.ranks = [];
                    config.ranks.push({ id: Date.now(), threshold: val, title: { uk: titleInput, en: titleInput } });
                    showToast(t.toast_added);
                }
                config.ranks.sort((a,b)=>a.threshold-b.threshold);
                document.getElementById('rank-title-ua').value = ""; document.getElementById('rank-threshold').value = "";
            } else {
                const pfx = (type === 'shop') ? 'shop' : type.slice(0, -1); 
                const titleInput = document.getElementById(`${pfx}-title-ua`).value; 
                const val = parseInt(document.getElementById(`${pfx}-${type === 'tasks' ? 'points' : 'cost'}`).value); 
                const icon = document.getElementById(`${pfx}-icon`).value;
                if (!titleInput || isNaN(val)) return showToast(t.toast_fill_fields); 
                
                if (editingState[type] !== null) {
                    const idx = config[type].findIndex(i => i.id === editingState[type]);
                    if (idx > -1) {
                        config[type][idx].title.uk = titleInput; config[type][idx].title.en = titleInput;
                        config[type][idx].icon = icon || '✨';
                        if (type === 'tasks') config[type][idx].points = val; else config[type][idx].cost = val;
                    }
                    editingState[type] = null;
                    const btnId = type === 'tasks' ? 'ui-admin-add-task' : (type === 'shop' ? 'ui-admin-add-item' : 'ui-admin-add-goal');
                    document.getElementById(btnId).innerText = t.add;
                    showToast(t.toast_updated);
                } else {
                    if (!config[type]) config[type] = [];
                    config[type].push({ id: Date.now(), title: { uk: titleInput, en: titleInput }, icon: icon || '✨', [type === 'tasks' ? 'points' : 'cost']: val }); 
                    showToast(t.toast_added);
                }
                document.getElementById(`${pfx}-title-ua`).value = ""; document.getElementById(`${pfx}-${type === 'tasks' ? 'points' : 'cost'}`).value = ""; document.getElementById(`${pfx}-icon`).value = "";
            }
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'main'), config); 
            renderAdminLists(); 
        };

        window.handleDelete = async (type, id) => { config[type] = config[type].filter(i => (i.id || i.threshold) !== id); await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'main'), config); renderAdminLists(); };

        window.enterDigit = (d, e) => { 
            const t = translations[state.lang];
            if(e) e.preventDefault();
            if (d === 'C') { pinB = ""; updatePinDots(); return; }
            pinB += d; updatePinDots(); 
            if (pinB.length === 4) { 
                if (pinB === state.pin) { 
                    pinB = ""; 
                    document.getElementById('pin-modal').classList.add('hidden'); 
                    document.getElementById('pin-modal').style.display = 'none';
                    document.getElementById('admin-modal').classList.remove('hidden'); 
                    window.switchAdminTab('general'); 
                } else { 
                    pinB = ""; updatePinDots(true); showToast(t.toast_wrong_pin); 
                } 
            } 
        };

        window.showDayDetails = (ds) => { 
            const t = translations[state.lang];
            selectedDateStr = ds; renderCalendar(); const logs = historyLogs.filter(l => toYMD(l.timestamp) === ds).sort((a,b) => b.timestamp - a.timestamp); 
            const dEl = document.getElementById('details-date'); if(dEl) dEl.innerText = new Date(ds + 'T00:00:00').toLocaleDateString(state.lang==='uk'?'uk-UA':'en-US', {day:'numeric', month:'long'});
            const bEl = document.getElementById('day-end-balance'); if(bEl) bEl.innerText = historyLogs.filter(l => l.timestamp <= new Date(ds + 'T23:59:59').getTime()).reduce((acc,l)=> l.reverted ? acc : (l.type==='task' ? acc+l.value : acc-l.value), 0);
            const lEl = document.getElementById('details-logs'); if(!lEl) return;
            if(logs.length===0) lEl.innerHTML = `<p class='text-sm text-slate-400 italic py-6 text-center font-bold font-black uppercase'>${t.no_activity}</p>`;
            else lEl.innerHTML = logs.map(l => {
                if (l.reverted) {
                    return `<div class='flex justify-between items-center bg-slate-50 p-4 rounded-xl shadow-sm text-xs text-slate-800 border border-red-100 opacity-80 grayscale'><div class='flex gap-3 items-center'><span class='text-2xl'>${l.icon||'🎯'}</span><div><span class='font-black text-slate-500 line-through'>${l.title}</span><p class="text-[8px] text-red-500 uppercase font-black mt-1">❌ ${t.reverted_mark_note}</p></div></div><span class='font-black text-slate-400 line-through'>${l.type==='task'?'+':'-'}${l.value} ⭐</span></div>`;
                }
                return `<div class='flex justify-between items-center bg-white p-4 rounded-xl shadow-sm text-xs text-slate-800 border border-slate-50'><div class='flex gap-3 items-center'><span class='text-2xl'>${l.icon||'🎯'}</span><span class='font-black'>${l.title}</span></div><span class='font-black ${l.type==='task'?'text-green-500':'text-orange-500'}'>${l.type==='task'?'+':'-'}${l.value} ⭐</span></div>`;
            }).join('');
            document.getElementById('day-details').classList.remove('hidden'); 
        };

        window.toggleLang = async () => {
            const nextLang = state.lang === 'uk' ? 'en' : 'uk';
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'userState', 'main'), { lang: nextLang });
        };

        // --- DATABASE LISTENERS ---

        const setupListeners = () => {
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'userState', 'main'), (snap) => {
                if (snap.exists()) state = snap.data();
                else setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'userState', 'main'), state);
                updateUI(); document.getElementById('loading').style.display = 'none';
            });
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'main'), (snap) => {
                if (snap.exists()) config = snap.data();
                else {
                    const def = {
                        tasks: [
                            {id:1, title:{uk:"Чищення зубів 🦷", en:"Teeth 🦷"}, points:10, icon:"✨"},
                            {id:2, title:{uk:"Застелити ліжко 🛌", en:"Bed 🛌"}, points:10, icon:"🏡"},
                            {id:3, title:{uk:"Домашня робота ✍️", en:"Homework ✍️"}, points:40, icon:"🎓"},
                            {id:4, title:{uk:"Читання книги 📖", en:"Reading 📖"}, points:30, icon:"📚"},
                            {id:5, title:{uk:"Прибрати іграшки 🧸", en:"Clean Toys 🧸"}, points:20, icon:"🏠"}
                        ],
                        shop: [{id:101, title:{uk:"iPad 30 хв", en:"iPad 30m"}, cost:50, icon:"🎮"}],
                        goals: [{id:501, title:{uk:"LEGO", en:"LEGO"}, cost:2000, icon:"🧱"}],
                        ranks: [
                            {id:1001, threshold:0, title:{uk:"Новачок", en:"Novice"}}, 
                            {id:1002, threshold:500, title:{uk:"Учень", en:"Apprentice"}}, 
                            {id:1003, threshold:1500, title:{uk:"Герой", en:"Hero"}}
                        ]
                    };
                    setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'main'), def);
                }
                updateUI();
            });
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'history'), (snap) => {
                historyLogs = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
                if(selectedDateStr) window.showDayDetails(selectedDateStr);
                renderCalendar(); 
                if(document.getElementById('admin-tab-audit').classList.contains('active')) renderAuditHistory();
            });
        };

        function start() {
            selectedDateStr = toYMD(new Date());
            auditDateStr = selectedDateStr;
            renderPinButtons();
            
            window.addEventListener('keydown', (e) => { 
                const modal = document.getElementById('pin-modal');
                if(modal && !modal.classList.contains('hidden')) {
                    if (e.key >= '0' && e.key <= '9') window.enterDigit(e.key);
                    if (e.key === 'Escape') window.closePinPad();
                    if (e.key === 'Backspace' || e.key === 'c' || e.key === 'C') window.enterDigit('C');
                }
            });

            signInAnonymously(auth).then(() => {
                onAuthStateChanged(auth, (u) => { user = u; if(u) setupListeners(); });
            }).catch(e => console.error(e));
        }
        
        start();
    </script>
</body>
</html>
