<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mark's Quest Center PRO 🏆</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap');
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: #f8fafc; 
            touch-action: manipulation; 
            -webkit-tap-highlight-color: transparent;
            font-size: 0.85rem; 
        }
        .quest-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); border-width: 2px; }
        .quest-card:active { transform: scale(0.98); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .calendar-day { 
            min-height: 5rem; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            border-radius: 12px; position: relative; border: 2px solid transparent; 
        }
        .calendar-day.selected { border-color: #3b82f6; background-color: #eff6ff; }
        .progress-bar { transition: width 0.8s ease-out; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .admin-tab-btn.active { background-color: #1e293b; color: white; border-left: 4px solid #3b82f6; }
        .reverted { opacity: 0.6; filter: grayscale(1); }
        
        /* 3D Анімація для зірочки */
        @keyframes coinFlip {
            0% { transform: rotateY(0deg) scale(1); }
            50% { transform: rotateY(180deg) scale(1.3); }
            100% { transform: rotateY(360deg) scale(1); }
        }
        .flip-anim { animation: coinFlip 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        /* Адаптивний Sidebar */
        #sidebar { transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); width: 80px; overflow: hidden; }
        #sidebar.expanded { width: 220px; }
        .sidebar-header { display: flex; align-items: center; justify-content: center; padding: 1rem; transition: all 0.3s; }
        #sidebar.expanded .sidebar-header { justify-content: flex-end; }
        
        .nav-item { display: flex; align-items: center; justify-content: center; padding: 0.75rem; border-radius: 1rem; transition: all 0.3s; margin: 0 0.5rem; border: 2px solid transparent;}
        #sidebar.expanded .nav-item { justify-content: flex-start; padding-left: 1.25rem; }
        
        .icon-element { font-size: 1.5rem; transition: transform 0.3s; }
        #sidebar.expanded .icon-element { transform: scale(0.9); }
        
        .nav-label { opacity: 0; display: none; margin-left: 1rem; font-size: 0.75rem; font-weight: 900; text-transform: uppercase; white-space: nowrap; }
        #sidebar.expanded .nav-label { opacity: 1; display: inline-block; }
        
        #main-wrapper { transition: margin-left 0.3s; margin-left: 80px; }
        #sidebar.expanded + #main-wrapper { margin-left: 220px; }

        [v-cloak] { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <div id="app" class="flex min-h-screen">
        <!-- Sidebar Навігація -->
        <aside id="sidebar" class="fixed h-full bg-white border-r-2 border-slate-100 flex flex-col z-[200] shadow-sm">
            <div class="sidebar-header w-full">
                <button onclick="window.toggleSidebar(event)" class="p-2 bg-slate-50 rounded-xl hover:bg-slate-100 transition-colors text-slate-600 w-10 h-10 flex items-center justify-center outline-none">
                    <span id="menu-icon" class="text-xl font-black">☰</span>
                </button>
            </div>
            
            <nav class="flex flex-col gap-3 mt-4">
                <button onclick="window.switchTab('tasks')" id="tab-tasks" class="nav-item bg-blue-600 text-white shadow-md transition-all">
                    <span class="icon-element">🎯</span>
                    <span class="nav-label">Квести</span>
                </button>
                <button onclick="window.switchTab('shop')" id="tab-shop" class="nav-item bg-white text-slate-400 hover:bg-slate-50 transition-all">
                    <span class="icon-element">🎁</span>
                    <span class="nav-label">Крамниця</span>
                </button>
                <button onclick="window.switchTab('goals')" id="tab-goals" class="nav-item bg-white text-slate-400 hover:bg-slate-50 transition-all">
                    <span class="icon-element">💎</span>
                    <span class="nav-label">Мрії</span>
                </button>
                <button onclick="window.switchTab('calendar')" id="tab-calendar" class="nav-item bg-white text-slate-400 hover:bg-slate-50 transition-all">
                    <span class="icon-element">📅</span>
                    <span class="nav-label">Історія</span>
                </button>
            </nav>

            <div class="mt-auto pb-6 pt-2">
                <button onclick="window.openPinPad(event)" class="nav-item bg-white text-slate-300 hover:text-slate-500 transition-all">
                    <span class="icon-element">⚙️</span>
                    <span class="nav-label" id="nav-label-admin">Адмін</span>
                </button>
            </div>
        </aside>

        <!-- Головна область -->
        <div id="main-wrapper" class="flex-1 min-w-0 p-4 md:p-6">
            <!-- Заставка завантаження -->
            <div id="loading" class="fixed inset-0 bg-white z-[300] flex items-center justify-center font-bold text-slate-600 text-center px-4">
                <div><div class="text-5xl mb-4 animate-bounce">🚀</div><div class="text-xl font-black uppercase text-blue-600 tracking-tighter" id="ui-loading-text">Синхронізація...</div></div>
            </div>

            <div class="max-w-5xl mx-auto space-y-6">
                <!-- Шапка -->
                <header class="relative bg-white pt-6 pb-10 px-8 rounded-[2rem] shadow-xl border-slate-100 overflow-hidden">
                    <div class="flex flex-col sm:flex-row justify-between items-center gap-4">
                        <div class="text-center sm:text-left flex-1">
                            <h1 id="ui-greeting" class="text-3xl font-black tracking-tight leading-none text-slate-800">Марк, вперед! 🚀</h1>
                            <div class="flex items-center gap-2 mt-2 justify-center sm:justify-start">
                                <span id="user-rank" class="bg-blue-600 text-white text-[9px] font-black px-2 py-0.5 rounded-full uppercase italic tracking-tighter shadow-sm">...</span>
                                <span class="text-slate-400 font-bold text-[9px] uppercase"><span id="ui-level-text">Рівень</span> <span id="user-level" class="text-blue-600">1</span></span>
                            </div>
                        </div>
                        <div class="flex items-center gap-4">
                            <button onclick="window.cycleTaskFilter()" id="btn-task-filter" class="bg-blue-50 px-3 py-1.5 rounded-lg text-[9px] font-black text-blue-600 border border-blue-200 uppercase hover:bg-blue-100 transition-colors shadow-sm flex items-center gap-1">
                                <span>⚙️</span> <span id="ui-filter-text">Дефолт</span>
                            </button>
                            <button onclick="window.toggleLang()" class="bg-slate-100 px-3 py-1.5 rounded-lg text-[9px] font-black text-slate-500 border-2 border-slate-200 uppercase hover:bg-slate-200 transition-colors">UA / EN</button>
                            <div id="balance-container" onclick="window.clickBalance()" class="bg-yellow-400 px-6 py-3 rounded-[1.2rem] flex items-center gap-2 shadow-md border-b-4 border-yellow-600 active:scale-95 hover:bg-yellow-300 transition-all cursor-pointer">
                                <span id="balance-star" class="text-xl inline-block">⭐</span>
                                <span id="balance" class="text-3xl font-black text-yellow-900 leading-none">0</span>
                            </div>
                        </div>
                    </div>
                    <!-- Прогрес бар -->
                    <div class="absolute bottom-0 left-0 w-full h-2 bg-slate-50">
                        <div id="level-progress" class="h-full bg-blue-500 progress-bar shadow-[0_0_10px_rgba(59,130,246,0.3)]" style="width: 0%"></div>
                    </div>
                </header>

                <!-- Контент секцій -->
                <div id="section-tasks" class="space-y-4">
                    <div id="tasks-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>

                <div id="section-shop" class="hidden space-y-4">
                    <div id="shop-list-container" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>

                <div id="section-goals" class="hidden space-y-4 text-slate-800">
                    <div id="goals-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>
                
                <!-- Історія та Календар у дві колонки -->
                <div id="section-calendar" class="hidden text-slate-800">
                    <div class="flex flex-col lg:flex-row gap-6 items-start">
                        <!-- Default: Today's Details -->
                        <div id="day-details" class="flex-1 w-full bg-white p-6 rounded-[2rem] border-2 border-slate-50 shadow-xl">
                            <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6 pb-4 border-b-2 border-slate-50">
                                <div class="text-center sm:text-left">
                                    <h4 id="details-date" class="font-black text-xl uppercase text-slate-800">Сьогодні</h4>
                                    <p class="text-[10px] font-bold text-slate-400 uppercase mt-1 tracking-widest"><span id="ui-day-balance">ЗАРОБЛЕНО:</span> <span id="day-end-balance" class="text-blue-600">0</span> ⭐</p>
                                </div>
                                <button onclick="window.toggleCalendarGrid()" id="btn-toggle-cal" class="bg-blue-50 text-blue-600 hover:bg-blue-100 transition-colors px-6 py-3 rounded-2xl font-black text-xs uppercase shadow-sm">
                                    📅 Відкрити календар
                                </button>
                            </div>
                            <div id="details-logs" class="space-y-2 text-slate-800"></div>
                        </div>

                        <!-- Hidden: Calendar Grid -->
                        <div id="calendar-grid-container" class="hidden w-full lg:w-[420px] xl:w-[480px] shrink-0 bg-white p-6 rounded-[2rem] shadow-lg border-2 border-slate-50">
                            <div class="flex flex-col xl:flex-row justify-between items-center mb-6 gap-3">
                                <h3 id="calendar-month-year" class="font-black uppercase text-sm"></h3>
                                <div class="flex items-center gap-3">
                                    <span id="ui-month-total" class="bg-yellow-50 text-yellow-700 font-black text-[10px] px-3 py-1.5 rounded-lg border border-yellow-100 hidden sm:inline-block">За місяць: 0 ⭐</span>
                                    <div class="flex gap-1">
                                        <button onclick="window.goToToday()" id="btn-today-main" class="p-2 px-3 bg-slate-50 rounded-lg hover:bg-slate-100 text-[10px] font-black uppercase text-slate-500 transition-colors">Сьогодні</button>
                                        <button onclick="window.changeMonth(-1)" class="p-2 bg-slate-50 rounded-lg hover:bg-slate-100">◀</button>
                                        <button onclick="window.changeMonth(1)" class="p-2 bg-slate-50 rounded-lg hover:bg-slate-100">▶</button>
                                    </div>
                                </div>
                            </div>
                            <div class="calendar-grid" id="calendar-body"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- PIN Modal -->
    <div id="pin-modal" class="fixed inset-0 bg-slate-950 hidden items-center justify-center p-8 z-[400] text-center text-slate-800">
        <button onclick="window.closePinPad(event)" class="absolute top-6 right-6 text-white text-5xl font-light hover:text-red-400 transition-colors">✕</button>
        <div class="w-full max-w-sm">
            <h2 class="text-white text-3xl font-black mb-8 tracking-tighter uppercase leading-tight text-slate-100" id="ui-pin-title">Доступ для<br>батьків</h2>
            <div id="pin-dots" class="flex justify-center gap-4 mb-10">
                <div class="w-5 h-5 rounded-full bg-slate-800 border-2 border-slate-700 transition-all"></div>
                <div class="w-5 h-5 rounded-full bg-slate-800 border-2 border-slate-700 transition-all"></div>
                <div class="w-5 h-5 rounded-full bg-slate-800 border-2 border-slate-700 transition-all"></div>
                <div class="w-5 h-5 rounded-full bg-slate-800 border-2 border-slate-700 transition-all"></div>
            </div>
            <div id="pin-grid" class="grid grid-cols-3 gap-4"></div>
        </div>
    </div>

    <!-- Task Description Modal -->
    <div id="desc-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center p-4 z-[450] cursor-pointer" onclick="this.classList.add('hidden'); this.classList.remove('flex');">
        <div class="bg-white p-8 rounded-3xl max-w-sm w-full text-center shadow-2xl transform transition-all cursor-default" onclick="event.stopPropagation()">
            <div class="text-6xl mb-4" id="desc-modal-icon">🎯</div>
            <h2 class="text-xl font-black text-slate-800 mb-3" id="desc-modal-title">Назва</h2>
            <p class="text-slate-600 font-medium text-sm leading-relaxed" id="desc-modal-text">Опис</p>
            <div class="mt-6">
                <button class="w-full bg-slate-100 text-slate-600 py-3 rounded-xl font-black uppercase text-xs hover:bg-slate-200 transition-colors" onclick="document.getElementById('desc-modal').classList.add('hidden'); document.getElementById('desc-modal').classList.remove('flex');">Зрозуміло</button>
            </div>
        </div>
    </div>

    <!-- Admin Panel -->
    <div id="admin-modal" class="fixed inset-0 bg-white hidden z-[500] overflow-y-auto">
        <div class="p-6 max-w-5xl mx-auto flex flex-col md:flex-row gap-8">
            <div class="w-full md:w-56 shrink-0 flex flex-col gap-2 text-slate-800 border-r-2 border-slate-50 pr-4">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-black uppercase tracking-tighter" id="ui-admin-title">Налаштування</h2>
                </div>
                
                <button onclick="window.closeAdminModal(event)" class="mb-4 bg-slate-100 text-slate-600 hover:bg-slate-200 py-3 px-4 rounded-xl text-[10px] font-black uppercase text-left transition-colors flex items-center gap-2">
                    <span class="text-lg">⬅</span> <span id="ui-admin-back">Повернутись</span>
                </button>

                <button onclick="window.switchAdminTab('general')" id="admin-tab-general" class="admin-tab-btn active text-left py-4 px-5 rounded-xl text-[10px] font-black uppercase"></button>
                <button onclick="window.switchAdminTab('tasks')" id="admin-tab-tasks" class="admin-tab-btn text-left py-4 px-5 rounded-xl text-[10px] font-black uppercase"></button>
                <button onclick="window.switchAdminTab('shop')" id="admin-tab-shop" class="admin-tab-btn text-left py-4 px-5 rounded-xl text-[10px] font-black uppercase"></button>
                <button onclick="window.switchAdminTab('goals')" id="admin-tab-goals" class="admin-tab-btn text-left py-4 px-5 rounded-xl text-[10px] font-black uppercase"></button>
                <button onclick="window.switchAdminTab('ranks')" id="admin-tab-ranks" class="admin-tab-btn text-left py-4 px-5 rounded-xl text-[10px] font-black uppercase"></button>
                <button onclick="window.switchAdminTab('audit')" id="admin-tab-audit" class="admin-tab-btn text-left py-4 px-5 rounded-xl text-[10px] font-black uppercase"></button>
            </div>
            
            <div class="flex-1 min-w-0 text-slate-800">
                <!-- Вкладка Головне -->
                <div id="admin-content-general" class="space-y-6">
                    <button onclick="window.confirmAction('resetTasks')" id="ui-admin-reset" class="w-full py-5 bg-slate-50 border-2 border-slate-200 rounded-3xl font-black text-sm uppercase text-slate-700 hover:bg-slate-100 transition-colors">🔄 Скинути завдання на сьогодні</button>
                    <button onclick="window.addBonus(50)" id="ui-admin-bonus" class="w-full py-5 bg-yellow-400 text-yellow-900 rounded-3xl font-black text-sm uppercase shadow-lg hover:bg-yellow-500 transition-colors">🎁 Дати бонус +50 ⭐</button>
                    <div class="p-6 bg-slate-50 rounded-2xl border-2 border-slate-100 text-center">
                        <p class="text-[10px] font-black text-slate-400 uppercase mb-3 text-center" id="ui-admin-change-pin">Зміна PIN-коду</p>
                        <input type="text" id="new-pin-input" maxlength="4" placeholder="Новий PIN" class="w-full p-3 rounded-xl border-2 border-slate-200 mb-4 text-center font-black text-2xl focus:border-blue-500 outline-none text-slate-800">
                        <button onclick="window.updatePin()" id="ui-admin-save-pin" class="w-full py-3 bg-slate-800 text-white rounded-xl text-xs font-black uppercase hover:bg-slate-900 transition-colors">Зберегти</button>
                    </div>
                </div>

                <!-- Вкладка Квести -->
                <div id="admin-content-tasks" class="hidden space-y-4">
                    <div class="bg-blue-600 p-4 rounded-2xl text-white shadow-md mb-4 text-center">
                        <p class="font-black uppercase text-[10px] mb-3 opacity-80 text-center text-white" id="ui-admin-new-quest">Новий квест</p>
                        <div class="flex flex-col gap-2 mb-2">
                            <input type="text" id="task-title-ua" placeholder="Назва (UA)" class="w-full p-2 rounded-lg font-bold text-slate-800">
                            <input type="text" id="task-title-en" placeholder="Title (EN)" class="w-full p-2 rounded-lg font-bold text-slate-800">
                            
                            <!-- Поля для описів -->
                            <textarea id="task-desc-ua" placeholder="Опис (UA)" class="w-full p-2 rounded-lg font-bold text-slate-800 text-xs" rows="2"></textarea>
                            <textarea id="task-desc-en" placeholder="Description (EN)" class="w-full p-2 rounded-lg font-bold text-slate-800 text-xs" rows="2"></textarea>
                            
                            <div class="flex gap-2">
                                <input type="number" id="task-points" placeholder="⭐" class="flex-1 p-2 rounded-lg font-bold text-slate-800">
                                <input type="text" id="task-icon" placeholder="Emoji" class="w-20 p-2 rounded-lg text-slate-800 font-bold text-center">
                            </div>
                            <label class="flex items-center justify-center gap-2 mt-1 text-[10px] font-black text-white uppercase tracking-widest bg-blue-700/50 p-2 rounded-lg cursor-pointer">
                                <input type="checkbox" id="task-required" class="w-4 h-4 rounded accent-blue-500">
                                <span id="ui-admin-task-req">❗️ Обов'язкове</span>
                            </label>
                        </div>
                        <button onclick="window.addItem('tasks')" id="ui-admin-add-task" class="w-full bg-white text-blue-600 py-2 rounded-lg font-black uppercase text-[10px] hover:bg-slate-100 transition-colors">Додати</button>
                    </div>
                    <div id="admin-list-tasks" class="space-y-2"></div>
                </div>

                <!-- Вкладка Крамниця -->
                <div id="admin-content-shop" class="hidden space-y-4">
                    <div class="bg-orange-500 p-4 rounded-2xl text-white shadow-md mb-4 text-center">
                        <p class="font-black uppercase text-[10px] mb-3 opacity-80 text-center text-white" id="ui-admin-new-item">Новий товар</p>
                        <div class="flex flex-col gap-2 mb-2">
                            <input type="text" id="shop-title-ua" placeholder="Назва (UA)" class="w-full p-2 rounded-lg font-bold text-slate-800">
                            <input type="text" id="shop-title-en" placeholder="Title (EN)" class="w-full p-2 rounded-lg font-bold text-slate-800">
                            <div class="flex gap-2">
                                <input type="number" id="shop-cost" placeholder="⭐" class="flex-1 p-2 rounded-lg font-bold text-slate-800">
                                <input type="text" id="shop-icon" placeholder="Emoji" class="w-20 p-2 rounded-lg text-slate-800 font-bold text-center">
                            </div>
                        </div>
                        <button onclick="window.addItem('shop')" id="ui-admin-add-item" class="w-full bg-white text-orange-600 py-2 rounded-lg font-black uppercase text-[10px] hover:bg-slate-100 transition-colors">Додати</button>
                    </div>
                    <div id="admin-list-shop" class="space-y-2 text-slate-800"></div>
                </div>

                <!-- Вкладка Мрії -->
                <div id="admin-content-goals" class="hidden space-y-4">
                    <div class="bg-purple-600 p-4 rounded-2xl text-white shadow-md mb-4 text-center">
                        <p class="font-black uppercase text-[10px] mb-3 opacity-80 text-center text-white" id="ui-admin-new-goal">Нова мрія</p>
                        <div class="flex flex-col gap-2 mb-2">
                            <input type="text" id="goal-title-ua" placeholder="Назва (UA)" class="w-full p-2 rounded-lg font-bold text-slate-800">
                            <input type="text" id="goal-title-en" placeholder="Title (EN)" class="w-full p-2 rounded-lg font-bold text-slate-800">
                            <div class="flex gap-2">
                                <input type="number" id="goal-cost" placeholder="⭐" class="flex-1 p-2 rounded-lg font-bold text-slate-800">
                                <input type="text" id="goal-icon" placeholder="Emoji" class="w-20 p-2 rounded-lg text-slate-800 font-bold text-center">
                            </div>
                        </div>
                        <button onclick="window.addItem('goals')" id="ui-admin-add-goal" class="w-full bg-white text-purple-600 py-2 rounded-lg font-black uppercase text-[10px] hover:bg-slate-100 transition-colors">Додати</button>
                    </div>
                    <div id="admin-list-goals" class="space-y-2 text-slate-800"></div>
                </div>

                <!-- Вкладка Рівні -->
                <div id="admin-content-ranks" class="hidden space-y-4">
                    <div class="bg-indigo-600 p-4 rounded-2xl text-white shadow-md mb-4 text-center">
                        <p class="font-black uppercase text-[10px] mb-3 opacity-80 text-center text-white" id="ui-admin-new-rank">Новий ранг</p>
                        <div class="flex flex-col gap-2 mb-2">
                            <input type="text" id="rank-title-ua" placeholder="Назва (UA)" class="w-full p-2 rounded-lg font-bold text-slate-800">
                            <input type="text" id="rank-title-en" placeholder="Title (EN)" class="w-full p-2 rounded-lg font-bold text-slate-800">
                            <input type="number" id="rank-threshold" placeholder="⭐" class="w-full p-2 rounded-lg font-bold text-slate-800">
                        </div>
                        <button onclick="window.addItem('ranks')" id="ui-admin-add-rank" class="w-full bg-white text-indigo-600 py-2 rounded-lg font-black uppercase text-[10px] hover:bg-slate-100 transition-colors">Додати</button>
                    </div>
                    <div id="admin-list-ranks" class="space-y-2 text-slate-800"></div>
                </div>

                <!-- Вкладка Аудит (У дві колонки) -->
                <div id="admin-content-audit" class="hidden text-slate-800">
                    <div class="flex flex-col lg:flex-row gap-6 items-start">
                        <div class="flex-1 w-full bg-slate-50 p-6 rounded-3xl border-2 border-slate-100 shadow-inner">
                            <h3 class="font-black uppercase text-[10px] text-slate-500 mb-4 tracking-widest text-center lg:text-left" id="ui-audit-day-title">📝 Журнал перевірки за день</h3>
                            <div id="admin-audit-logs" class="space-y-2"></div>
                        </div>
                        
                        <div class="w-full lg:w-[420px] xl:w-[480px] shrink-0 bg-white p-6 rounded-3xl border-2 border-slate-100 shadow-sm">
                            <div class="flex justify-between items-center mb-6">
                                <h3 id="audit-calendar-header-title" class="font-black uppercase text-[10px]">Журнал перевірки</h3>
                                <div class="flex gap-1">

        function renderAuditCalendar() {
            const b = document.getElementById('audit-calendar-body'); 
            if(!b) return;
            const currentLang = state.lang || 'uk';
            setElText('audit-calendar-header-title', auditDate.toLocaleDateString(currentLang==='uk'?'uk-UA':'en-US', {month:'long', year:'numeric'}));
            
            const y = auditDate.getFullYear(), m = auditDate.getMonth(); 
            const fd = new Date(y, m, 1).getDay(); const dim = new Date(y, m+1, 0).getDate(); const off = fd === 0 ? 6 : fd - 1;
            
            let html = ""; for (let i = 0; i < off; i++) html += `<div></div>`;
            for (let d = 1; d <= dim; d++) {
                const ds = toYMD(new Date(y, m, d));
                const dayLogs = historyLogs.filter(l => toYMD(l.timestamp) === ds && !l.reverted);
                const count = dayLogs.filter(l => l.type === 'task').length;
                const stars = dayLogs.reduce((s, l) => l.type==='task' ? s+l.value : s-l.value, 0);
                html += `<div onclick="window.setAuditDay('${ds}')" class='calendar-day cursor-pointer p-1 transition-all text-[10px] ${auditDateStr===ds?'bg-blue-600 text-white shadow-md':'bg-slate-50 text-slate-800 hover:bg-slate-100'}'>

        }

        function renderCalendar() {
            const b = document.getElementById('calendar-body'); 
            if(!b) return;
            const currentLang = state.lang || 'uk';
            const t = translations[currentLang] || translations['uk'];
            
            setElText('calendar-month-year', viewDate.toLocaleDateString(currentLang==='uk'?'uk-UA':'en-US', {month:'long', year:'numeric'}));
            
            const y = viewDate.getFullYear(), m = viewDate.getMonth(); 
            const fd = new Date(y, m, 1).getDay(); const dim = new Date(y, m+1, 0).getDate(); const off = fd === 0 ? 6 : fd - 1;
            const totalTasksAvailable = config.tasks ? config.tasks.length : 0;
            let monthTotal = 0;
            let h = ""; 
            
            for (let i = 0; i < off; i++) h += `<div></div>`;
            for (let d = 1; d <= dim; d++) {
                const ds = toYMD(new Date(y, m, d));
                const dayLogs = historyLogs.filter(l => toYMD(l.timestamp) === ds && !l.reverted);
                const count = dayLogs.filter(l => l.type === 'task').length;
                const earned = dayLogs.reduce((s,l)=> l.type==='task' ? s+l.value : s, 0);
                monthTotal += earned;
                
                const bal = historyLogs.filter(l => l.timestamp <= new Date(ds + 'T23:59:59').getTime()).reduce((acc,l)=> l.reverted ? acc : (l.type==='task' ? acc+l.value : acc-l.value), 0);
                
                h += `<div onclick="window.showDayDetails('${ds}')" class='calendar-day cursor-pointer p-2 transition-all ${selectedDateStr===ds?'selected border-blue-400 shadow-md':'bg-slate-50 hover:bg-slate-100'} text-slate-800'>

                    </div>`;
            } 
            b.innerHTML = h;
            
            const monthTotalEl = document.getElementById('ui-month-total');

        }

        function updateLevelUI() {
            if (!config.ranks || config.ranks.length === 0) return;
            const total = state.totalEarned || 0;
            let ci = 0; for (let i = config.ranks.length - 1; i >= 0; i--) if (total >= config.ranks[i].threshold) { ci = i; break; }
            setElText('user-rank', getTitle(config.ranks[ci]));
            setElText('user-level', ci + 1);
            const next = config.ranks[ci + 1];
            const p = next ? Math.min(100, Math.max(0, ((total - config.ranks[ci].threshold) / (next.threshold - config.ranks[ci].threshold)) * 100)) : 100;
            const progEl = document.getElementById('level-progress'); if(progEl) progEl.style.width = p + "%";
        }

        window.clickBalance = function() {
            const star = document.getElementById('balance-star');
            if (star) {
                star.classList.remove('flip-anim');
                void star.offsetWidth;
                star.classList.add('flip-anim');
            }

            const total = state.totalEarned || 0;
            let nextRank = null;
            if (config.ranks && config.ranks.length > 0) {
                const sortedRanks = [...config.ranks].sort((a,b) => a.threshold - b.threshold);
                nextRank = sortedRanks.find(r => r.threshold > total);
            }

            const currentLang = state.lang || 'uk';
            const randomPhrase = currentLang === 'uk' 
                ? ukMotivations[Math.floor(Math.random() * ukMotivations.length)]
                : enMotivations[Math.floor(Math.random() * enMotivations.length)];

            if (nextRank) {
                const diff = nextRank.threshold - total;
                const rankName = getTitle(nextRank);

        window.addItem = async (type) => { 
            const currentLang = state.lang || 'uk';
            const t = translations[currentLang] || translations['uk'];
            
            if (type === 'ranks') {
                const titleInputUaEl = document.getElementById('rank-title-ua');
                const titleInputEnEl = document.getElementById('rank-title-en');
                const valInputEl = document.getElementById('rank-threshold');
                
                const titleInputUa = titleInputUaEl ? titleInputUaEl.value : '';
                const titleInputEn = titleInputEnEl ? titleInputEnEl.value : titleInputUa;
                const val = valInputEl ? parseInt(valInputEl.value) : NaN;
                
                if (!titleInputUa || isNaN(val)) return showToast(t.toast_fill_fields);
                
                if (editingState.ranks !== null) {
                    const idx = config.ranks.findIndex(r => (r.id || r.threshold) === editingState.ranks);
                    if (idx > -1) { 
                        config.ranks[idx].title = { uk: titleInputUa, en: titleInputEn }; 
                        config.ranks[idx].threshold = val; 
                    }
                    editingState.ranks = null;
                    const addBtn = document.getElementById('ui-admin-add-rank');
                    if(addBtn) addBtn.innerText = t.add;
                    showToast(t.toast_updated);
                } else {
                    if (!config.ranks) config.ranks = [];
                    config.ranks.push({ id: Date.now(), threshold: val, title: { uk: titleInputUa, en: titleInputEn } });
                    showToast(t.toast_added);
                }
                config.ranks.sort((a,b)=>a.threshold-b.threshold);
                if(titleInputUaEl) titleInputUaEl.value = ""; 
                if(titleInputEnEl) titleInputEnEl.value = ""; 
                if(valInputEl) valInputEl.value = "";
            } else {
                const pfx = (type === 'shop') ? 'shop' : type.slice(0, -1); 
                const titleInputUaEl = document.getElementById(`${pfx}-title-ua`);
                const titleInputEnEl = document.getElementById(`${pfx}-title-en`);
                const valInputEl = document.getElementById(`${pfx}-${type === 'tasks' ? 'points' : 'cost'}`);
                const iconInputEl = document.getElementById(`${pfx}-icon`);
                
                const titleInputUa = titleInputUaEl ? titleInputUaEl.value : ''; 
                const titleInputEn = titleInputEnEl ? titleInputEnEl.value : titleInputUa; 
                const val = valInputEl ? parseInt(valInputEl.value) : NaN; 
                const icon = (iconInputEl ? iconInputEl.value : '') || '✨';
                
                let isReq = false;
                let descUa = '';
                let descEn = '';
                if (type === 'tasks') {
                    const reqEl = document.getElementById('task-required');
                    if (reqEl) isReq = reqEl.checked;
                    
                    const descElUa = document.getElementById('task-desc-ua');
                    const descElEn = document.getElementById('task-desc-en');
                    descUa = descElUa ? descElUa.value : '';
                    descEn = descElEn ? descElEn.value : descUa;
                }
                
                if (!titleInputUa || isNaN(val)) return showToast(t.toast_fill_fields); 
                
                if (editingState[type] !== null) {
                    const idx = config[type].findIndex(i => i.id === editingState[type]);
                    if (idx > -1) {
                        config[type][idx].title = { uk: titleInputUa, en: titleInputEn };
                        config[type][idx].icon = icon;
                        if (type === 'tasks') {
                            config[type][idx].points = val;
                            config[type][idx].isRequired = isReq;
                            config[type][idx].desc = { uk: descUa, en: descEn };
                        } else config[type][idx].cost = val;
                    }
                    editingState[type] = null;
                    const btnId = type === 'tasks' ? 'ui-admin-add-task' : (type === 'shop' ? 'ui-admin-add-item' : 'ui-admin-add-goal');
                    const addBtn = document.getElementById(btnId);
                    if(addBtn) addBtn.innerText = t.add;
                    showToast(t.toast_updated);
                } else {
                    if (!config[type]) config[type] = [];
                    const newItem = { id: Date.now(), title: { uk: titleInputUa, en: titleInputEn }, icon: icon, [type === 'tasks' ? 'points' : 'cost']: val };
                    if (type === 'tasks') {
                        newItem.isRequired = isReq;
                        newItem.desc = { uk: descUa, en: descEn };
                    }
                    config[type].push(newItem); 
                    showToast(t.toast_added);
                }
                
                if(titleInputUaEl) titleInputUaEl.value = ""; 
                if(titleInputEnEl) titleInputEnEl.value = ""; 
                if(valInputEl) valInputEl.value = ""; 
                if(iconInputEl) iconInputEl.value = "";
                if(type === 'tasks') {
                    const reqEl = document.getElementById('task-required');
                    if (reqEl) reqEl.checked = false;
                    const descElUa = document.getElementById('task-desc-ua');
                    const descElEn = document.getElementById('task-desc-en');
                    if (descElUa) descElUa.value = "";
                    if (descElEn) descElEn.value = "";
                }
            }
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'main'), config).catch(e => console.error(e)); 
            renderAdminLists();

        window.showDayDetails = (ds) => { 
            const currentLang = state.lang || 'uk';
            const t = translations[currentLang] || translations['uk'];
            selectedDateStr = ds; 
            renderCalendar(); 
            const logs = historyLogs.filter(l => toYMD(l.timestamp) === ds).sort((a,b) => b.timestamp - a.timestamp); 
            
            const dEl = document.getElementById('details-date'); 
            if(dEl) dEl.innerText = new Date(ds + 'T00:00:00').toLocaleDateString(currentLang==='uk'?'uk-UA':'en-US', {day:'numeric', month:'long'});
            
            const bEl = document.getElementById('day-end-balance'); 
            if(bEl) bEl.innerText = historyLogs.filter(l => l.timestamp <= new Date(ds + 'T23:59:59').getTime()).reduce((acc,l)=> l.reverted ? acc : (l.type==='task' ? acc+l.value : acc-l.value), 0);
            
            const lEl = document.getElementById('details-logs'); 
            if(!lEl) return;
            
            if(logs.length===0) lEl.innerHTML = `<p class='text-sm text-slate-400 italic py-6 text-center font-bold font-black uppercase'>${t.no_activity}</p>`;
            else lEl.innerHTML = logs.map(l => {
                if (l.reverted) {
                    return `<div class='flex justify-between items-center bg-slate-50 p-4 rounded-xl shadow-sm text-xs text-slate-800 border border-red-100 opacity-80 grayscale'><div class='flex gap-3 items-center'><span class='text-2xl'>${l.icon||'🎯'}</span><div><span class='font-black text-slate-500 line-through'>${l.title}</span><p class="text-[8px] text-red-500 uppercase font-black mt-1">❌ ${t.reverted_mark_note}</p></div></div><span class='font-black text-slate-400 line-through'>${l.type==='task'?'+':'-'}${l.value} ⭐</span></div>`;
                }
                return `<div class='flex justify-between items-center bg-white p-4 rounded-xl shadow-sm text-xs text-slate-800 border border-slate-50'><div class='flex gap-3 items-center'><span class='text-2xl'>${l.icon||'🎯'}</span><span class='font-black'>${l.title}</span></div><span class='font-black ${l.type==='task'?'text-green-500':'text-orange-500'}'>${l.type==='task'?'+':'-'}${l.value} ⭐</span></div>`;
            }).join('');
            
            const detailsContainer = document.getElementById('day-details');
            if(detailsContainer) detailsContainer.classList.remove('hidden'); 
        };

        window.toggleLang = async () => {
            const currentLang = state.lang || 'uk';
            const nextLang = currentLang === 'uk' ? 'en' : 'uk';
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'userState', 'main'), { lang: nextLang }).catch(e => console.error(e));
        };

        // --- BACKGROUND DAILY RESET CHECKER ---
        const checkDailyReset = async () => {
            if (!user) return;
            const today = toYMD(new Date());
            if (state.lastResetDate && state.lastResetDate !== today) {
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'userState', 'main'), {
                        completedTasks: [],
                        lastResetDate: today
                    });
                } catch (e) { console.error("Auto-reset failed", e); }
            }
        };

        setInterval(checkDailyReset, 60000);

        // --- DATABASE LISTENERS ---

        const setupListeners = () => {
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'userState', 'main'), (snap) => {
                if (snap.exists()) {
                    const dbState = snap.data();
                    state = { balance: 0, totalEarned: 0, completedTasks: [], lang: 'uk', pin: '0000', lastResetDate: '', ...dbState };
                    
                    const today = toYMD(new Date());
                    if (state.lastResetDate !== today) {
                        state.completedTasks = [];
                        state.lastResetDate = today;
                        updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'userState', 'main'), {
                            completedTasks: [],
                            lastResetDate: today
                        }).catch(e => console.error(e));
                    }
                } else {
                    state.lastResetDate = toYMD(new Date());
                    setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'userState', 'main'), state).catch(e => console.error(e));
                }
                updateUI(); 
                const loader = document.getElementById('loading');
                if(loader) loader.style.display = 'none';
            }, (error) => console.error(error));
            
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'main'), (snap) => {
                if (snap.exists()) {
                    const dbConfig = snap.data();
                    config = { tasks: [], shop: [], goals: [], ranks: [], ...dbConfig };
                } else {
                    const def = {
                        tasks: [
                            {id:1, title:{uk:"Чищення зубів 🦷", en:"Teeth 🦷"}, desc:{uk:"Ретельно почисть зуби.", en:"Brush carefully."}, points:20, icon:"✨", isRequired:true},
                            {id:2, title:{uk:"Застелити ліжко 🛌", en:"Bed 🛌"}, desc:{uk:"Охайно застели ліжко.", en:"Make your bed."}, points:20, icon:"🏡", isRequired:true},
                            {id:3, title:{uk:"Домашня робота ✍️", en:"Homework ✍️"}, desc:{uk:"Виконай всі уроки.", en:"Do all homework."}, points:50, icon:"🎓", isRequired:true},
                            {id:4, title:{uk:"Читання книги 📖", en:"Reading 📖"}, desc:{uk:"Мінімум 20 хв.", en:"Read for 20 mins."}, points:30, icon:"📚", isRequired:true},
                            {id:5, title:{uk:"Прибрати кімнату 🧸", en:"Clean Room 🧸"}, desc:{uk:"Склади всі речі.", en:"Tidy up."}, points:30, icon:"🏠", isRequired:true},
                            {id:6, title:{uk:"Допомога по дому 🍽️", en:"Help 🍽️"}, desc:{uk:"Допоможи з посудом.", en:"Help with dishes."}, points:30, icon:"🧼", isRequired:true},
                            {id:7, title:{uk:"Додаткове читання 📚", en:"Extra Read 📚"}, desc:{uk:"Ще 20 хв читання.", en:"Extra 20 mins."}, points:20, icon:"📖", isRequired:false},
                            {id:8, title:{uk:"Тренування 💪", en:"Workout 💪"}, desc:{uk:"Фізичні вправи.", en:"Do exercises."}, points:20, icon:"🏃‍♂️", isRequired:false},
                            {id:9, title:{uk:"Творчість 🎨", en:"Creativity 🎨"}, desc:{uk:"Малювання або ліпка.", en:"Draw or craft."}, points:30, icon:"🖍️", isRequired:false}
                        ],
                        shop: [
                            {id:101, title:{uk:"iPad 30 хв", en:"iPad 30m"}, cost:400, icon:"🎮"},
                            {id:102, title:{uk:"$1 Кишенькові", en:"$1 Pocket"}, cost:400, icon:"💵"},
                            {id:103, title:{uk:"$2 Кишенькові", en:"$2 Pocket"}, cost:800, icon:"💵"},
                            {id:104, title:{uk:"$5 Кишенькові", en:"$5 Pocket"}, cost:2000, icon:"💵"}
                        ],
                        goals: [{id:501, title:{uk:"LEGO", en:"LEGO"}, cost:7500, icon:"🧱"}],
                        ranks: [
                            {id:1001, threshold:0, title:{uk:"Новачок", en:"Novice"}}, 
                            {id:1002, threshold:500, title:{uk:"Учень", en:"Apprentice"}}, 
                            {id:1003, threshold:1500, title:{uk:"Герой", en:"Hero"}}
                        ]
                    };
                    setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'main'), def).catch(e => console.error(e));
                }
                updateUI();
            }, (error) => console.error(error));
            
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'history'), (snap) => {
                historyLogs = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
                if(selectedDateStr) window.showDayDetails(selectedDateStr);
                renderCalendar(); 
                
                const auditTab = document.getElementById('admin-tab-audit');
                if(auditTab && auditTab.classList && auditTab.classList.contains('active')) renderAuditHistory();
            }, (error) => console.error(error));
        };

        function start() {
            selectedDateStr = toYMD(new Date());
            auditDateStr = selectedDateStr;
            renderPinButtons();
            
            window.addEventListener('keydown', (e) => { 
                const modal = document.getElementById('pin-modal');
                if(modal && !modal.classList.contains('hidden')) {
                    if (e.key >= '0' && e.key <= '9') window.enterDigit(e.key);
                    if (e.key === 'Escape') window.closePinPad();
                    if (e.key === 'Backspace' || e.key === 'c' || e.key === 'C') window.enterDigit('C');
                }
            });

            signInAnonymously(auth).then(() => {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    signInWithCustomToken(auth, __initial_auth_token).catch(e => console.error(e));
                }
                onAuthStateChanged(auth, (u) => { user = u; if(u) setupListeners(); });
            }).catch(e => console.error(e));
        }
        
        start();
    </script>
</body>
</html>
